		<script src="dist/main.bundle.js" defer></script>

		<!-- AuraTracker bridge: detects race finish and posts time to parent -->
		<script>
		(function () {
			function parseTimeMs(str) {
				// Game format: "MM:SS.mmm" e.g. "00:12.345"
				var m = /^(\d+):(\d{2}\.\d{3})$/.exec(str ? str.trim() : '');
				if (!m) return null;
				var ms = Math.round((parseInt(m[1], 10) * 60 + parseFloat(m[2])) * 1000);
				return ms > 0 && ms < 600000 ? ms : null;
			}

			function notify(node) {
				var currentEl = node.querySelector('.current');
				if (!currentEl) return;
				var ms = parseTimeMs(currentEl.textContent);
				if (ms !== null) {
					window.parent.postMessage({ type: 'polytrack:finish', timeMs: ms }, '*');
				}
			}

			var observer = new MutationObserver(function (mutations) {
				mutations.forEach(function (mutation) {
					mutation.addedNodes.forEach(function (node) {
						if (node.nodeType === 1 && node.classList && node.classList.contains('time-announcer')) {
							notify(node);
						}
					});
				});
			});

			function start() {
				var ui = document.getElementById('ui');
				if (ui) {
					observer.observe(ui, { childList: true });
				} else {
					setTimeout(start, 50);
				}
			}

			start();
		})();
		</script>
	</body>
