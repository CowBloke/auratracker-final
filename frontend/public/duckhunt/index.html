<!DOCTYPE HTML>
<meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
<html>
<head>
  <title>DuckHuntJS</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="description" content="An open source, web based, responsive implementation of Duck Hunt in canvas or webgl depending on your client.">
  <meta name="author" content="Matt Surabian">
  <style>
    body {
      overflow:hidden;
      margin: 0;
      padding: 0;
      background-color: #000000;
      width: 100%;
      height: 100%;
    }
    html {
      width: 100%;
      height: 100%;
    }
  </style>
  <script src="duckhunt.js"></script>
</head>
<body>
<script>
  let lastScore = 0;
  let gameInstance = null;
  
  // Initialize game when document is ready
  function initializeGame() {
    try {
      if (window.Game && !gameInstance) {
        gameInstance = new window.Game({
          spritesheet: 'sprites.json'
        }).load();
        console.log('DuckHunt initialized');
      }
    } catch (e) {
      console.error('Init error:', e);
    }
  }
  
  // Try to initialize on DOMContentLoaded
  document.addEventListener('DOMContentLoaded', initializeGame, false);
  
  // Also try immediately in case game script already loaded
  if (document.readyState === 'loading') {
    setTimeout(initializeGame, 100);
  } else {
    initializeGame();
  }
  
  // Fallback retry
  setTimeout(initializeGame, 1000);
  
  // Monitor score
  setInterval(function() {
    try {
      let score = 0;
      if (window.stage && window.stage.hud && typeof window.stage.hud.maxScore === 'number') {
        score = Math.floor(window.stage.hud.maxScore) || 0;
      }
      
      if (score !== lastScore && score >= 0) {
        lastScore = score;
        try {
          window.parent.postMessage({ type: 'scoreUpdate', score: score }, '*');
        } catch (e) {}
      }
    } catch (e) {}
  }, 200);
  
  // Listen for commands
  window.addEventListener('message', function(event) {
    if (event.data && event.data.command === 'startGame') {
      lastScore = 0;
    }
  });
</script>
</body>
</html>
