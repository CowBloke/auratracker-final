<!DOCTYPE HTML>
<meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
<html>
<head>
  <title>DuckHuntJS</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="description" content="An open source, web based, responsive implementation of Duck Hunt in canvas or webgl depending on your client.">
  <meta name="author" content="Matt Surabian">
  <style>
    body {
      overflow:hidden;
      margin: 0;
      padding: 0;
      background-color: #000000;
    }
  </style>
  <script src="duckhunt.js"></script>
</head>
<body>
<script>
  let lastScore = 0;
  
  // Hook after duckhunt.js loads and initializes
  const originalSetTimeout = window.setTimeout;
  
  document.addEventListener('DOMContentLoaded', function() {
    // Try to find the game and hook into score updates
    setTimeout(function() {
      const monitorScore = setInterval(function() {
        try {
          // Try to access the game state from window
          let currentScore = 0;
          
          // Method 1: Check if Game instance has maxScore
          if (window.game && window.game.maxScore !== undefined) {
            currentScore = Math.floor(window.game.maxScore) || 0;
          }
          // Method 2: Check stage hud
          else if (window.stage && window.stage.hud && window.stage.hud.maxScore !== undefined) {
            currentScore = Math.floor(window.stage.hud.maxScore) || 0;
          }
          
          // Send score update to parent
          if (currentScore !== lastScore) {
            lastScore = currentScore;
            try {
              window.parent.postMessage({
                type: 'scoreUpdate',
                score: currentScore
              }, '*');
            } catch (e) {
              // Cross-origin might block this
            }
          }
        } catch (e) {
          // Silent fail
        }
      }, 200);
    }, 500);
  }, false);
  
  // Listen for parent messages
  window.addEventListener('message', function(event) {
    if (event.data && event.data.command === 'startGame') {
      lastScore = 0;
    }
  });
</script>
</body>
</html>
