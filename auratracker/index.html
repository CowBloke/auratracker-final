<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Modal Kit | Aura Tracker</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #0a0a0a; color: #fafafa;
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased; }
  * { box-sizing: border-box; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="modals.jsx"></script>
<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;

function App() {
  return (
    <DesignCanvas title="AuraTracker — Modal Kit" subtitle="shadcn-flavored, compact, colorful · drop-in modals for alerts, info, menus and complex flows">
      <DCSection id="alerts" title="Alerts &amp; confirmations" subtitle="Color-coded by intent. Compact header, icon tile, footer with primary action.">
        <DCArtboard id="destructive" label="Destructive" width={460} height={300}>
          <DestructiveAlert />
        </DCArtboard>
        <DCArtboard id="warning" label="Warning" width={460} height={300}>
          <WarningAlert />
        </DCArtboard>
        <DCArtboard id="success" label="Success" width={460} height={300}>
          <SuccessAlert />
        </DCArtboard>
        <DCArtboard id="info" label="Info / unlock" width={460} height={300}>
          <InfoAlert />
        </DCArtboard>
      </DCSection>

      <DCSection id="forms" title="Compact forms" subtitle="Inputs in a single column with inline chip presets. Footer carries fee/meta on the left, actions on the right.">
        <DCArtboard id="send-aura" label="Send aura" width={480} height={400}>
          <SendAuraModal />
        </DCArtboard>
      </DCSection>

      <DCSection id="menus" title="Action menus" subtitle="Two patterns: a grid of colorful icon buttons, and a tight icon-row menu attached to a player avatar.">
        <DCArtboard id="quick-actions" label="Quick actions grid" width={520} height={440}>
          <QuickActionsModal />
        </DCArtboard>
        <DCArtboard id="player-menu" label="Player menu" width={400} height={500}>
          <PlayerMenuModal />
        </DCArtboard>
      </DCSection>

      <DCSection id="complex" title="Complex modals" subtitle="Sidebar-nav settings with sectioned toggles, and a top-tabbed trade modal with two side-by-side columns — no nested cards.">
        <DCArtboard id="settings" label="Settings · sidebar nav + subsections" width={780} height={560}>
          <SettingsModal />
        </DCArtboard>
        <DCArtboard id="trade" label="Trade · tab menu + two columns" width={740} height={580}>
          <TradeModal />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
